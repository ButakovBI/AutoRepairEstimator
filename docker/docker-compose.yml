version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-repair-postgres
    environment:
      POSTGRES_DB: auto_repair
      POSTGRES_USER: auto_repair
      POSTGRES_PASSWORD: auto_repair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_repair"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: auto-repair-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auto-repair-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auto-repair-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: auto-repair-backend
    depends_on:
      - postgres
      - minio
      - kafka
    environment:
      APP_ENV: development
    ports:
      - "8000:8000"

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: auto-repair-bot
    depends_on:
      - backend
    environment:
      APP_ENV: development
    ports:
      - "8001:8001"

  ml_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml_worker
    container_name: auto-repair-ml-worker
    depends_on:
      - backend
      - minio
      - kafka
    environment:
      APP_ENV: development
    ports:
      - "8002:8002"

volumes:
  postgres_data:
  minio_data:

