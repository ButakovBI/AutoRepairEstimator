name: auto-repair-estimator-ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Check formatting with ruff
        run: ruff format --check src/

      - name: Type check with mypy
        run: mypy src/

      - name: Run tests with coverage
        # On GitHub Actions runners (Ubuntu + Docker available) the DB integration
        # tests will spin up a Postgres container via testcontainers automatically.
        # The --cov-fail-under threshold accounts for infrastructure modules that
        # are intentionally excluded from coverage measurement (see pyproject.toml).
        run: pytest tests/ --cov=auto_repair_estimator --cov-report=term-missing --cov-fail-under=70
